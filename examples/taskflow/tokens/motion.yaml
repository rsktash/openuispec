# TaskFlow — Motion Tokens

motion:
  duration:
    instant: 100
    quick: 200
    normal: 300
    slow: 500

  easing:
    default: "ease-out"
    enter: "ease-out"
    exit: "ease-in"
    emphasis: "cubic-bezier(0.2, 0, 0, 1)"

  reduced_motion: "remove-animation"

  patterns:
    press_feedback:
      duration: "instant"
      property: "scale"
      value: 0.97
    state_change:
      duration: "quick"
      property: "opacity, background"
    screen_enter:
      duration: "normal"
      easing: "enter"
      pattern: "slide-from-trailing"
    screen_exit:
      duration: "quick"
      easing: "exit"
      pattern: "slide-to-leading"
    checkbox_check:
      duration: "quick"
      easing: "emphasis"
      pattern: "scale-bounce"
    list_reorder:
      duration: "normal"
      easing: "emphasis"
      pattern: "layout-shift"
