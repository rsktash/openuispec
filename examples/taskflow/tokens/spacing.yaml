# TaskFlow — Spacing Tokens

spacing:
  base_unit: 4
  platform_flex: 0.15

  scale:
    none: 0
    xxs: 2
    xs: 4
    sm: 8
    md: { base: 16, range: [12, 16] }
    lg: { base: 24, range: [20, 24] }
    xl: 32
    xxl: 48

  aliases:
    page_margin: { horizontal: md, vertical: md }
    card_padding: { all: md }
    section_gap: lg
    inline_gap: sm
    stack_gap: md
