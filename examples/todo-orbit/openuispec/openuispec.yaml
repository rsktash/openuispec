# openuispec-sample — OpenUISpec v0.2
spec_version: "0.2"

project:
  name: "Todo Orbit"
  description: "A bilingual todo app spec for testing OpenUISpec generation and drift"
  icon: "checkmark_list"

includes:
  tokens: "./tokens/"
  contracts: "./contracts/"
  components: "./components/"
  screens: "./screens/"
  flows: "./flows/"
  platform: "./platform/"
  locales: "./locales/"

custom_contracts:
  - "./contracts/x_schedule_preview.yaml"

i18n:
  default_locale: "en"
  supported_locales: [en, ru]
  fallback_strategy: "default"

generation:
  targets: [ios, android, web]
  extra_rules:
    - "Generation hint strings may start with [common], [ios], [android], or [web] to indicate scope."
  # output_dir:                          # Optional: map targets to code directories
  #   ios: "../ios-app/"                  # relative to this file
  #   android: "../android-app/"
  #   web: "../web-ui/"
  code_roots:
    backend: "../backend/"
  output_format:
    ios: { language: swift, framework: swiftui, min_version: "17.0" }
    android: { language: kotlin, framework: compose, min_sdk: 26 }
    web: { language: typescript, framework: react, bundler: vite }

generation_guidance:
  universal_anti_patterns:
    typography:
      - "Do not fall back to Inter, Roboto, Arial, or system defaults when the spec defines a custom font_family"
      - "Do not use a single font weight throughout — the typography scale defines different weights per level"
      - "Do not use monospace fonts as shorthand for 'technical' aesthetic unless the spec explicitly calls for it"
    color:
      - "Do not use pure black (#000000) or pure white (#FFFFFF) — always resolve through the token layer"
      - "Do not use the AI-default palette: cyan-on-dark, purple-to-blue gradients, neon accents"
      - "Do not use gray text on colored backgrounds — derive text color from the on_color token or a darkened shade"
      - "Do not apply the same opacity to all border tokens — border.default and border.emphasis have distinct opacity values"
    spacing:
      - "Do not use the same spacing value everywhere — the spec defines xxs through xxxl for a reason"
      - "Do not ignore the page_margin and card_padding aliases — they exist to enforce consistent spatial rhythm"
      - "Do not add spacing that the spec doesn't define — if a gap isn't in the token scale, it shouldn't exist in output"
    motion:
      - "Do not use bounce or elastic easing — these feel dated and the spec defines specific easing curves"
      - "Do not apply the same duration to all animations — instant, quick, normal, and slow serve different purposes"
      - "Do not ignore reduced_motion — when the user prefers reduced motion, animations must be removed entirely"
    elevation:
      - "Do not add shadows to elements that don't specify an elevation token"
      - "Do not use the same shadow depth for cards and modals — cards use elevation.md, modals use elevation.lg"
    layout:
      - "Do not assume large-screen layouts work on compact — every multi-pane pattern needs an explicit compact fallback"
      - "Do not use pixel breakpoints — reference size classes by name (compact, regular, expanded)"
    visual:
      - "Do not mix rounded and sharp corners within the same card or surface — the spec uses cut-corner shapes exclusively"
      - "Do not add decorative gradients, glows, or background textures — this is a restrained design"
      - "Do not apply gradient text — it fails contrast checks and undermines the minimal aesthetic"
      - "[web] Do not use box-shadow on every container — reserve elevation for interactive or raised elements"
    interaction:
      - "Do not treat hover and focus as the same state — keyboard users never see hover"
      - "Do not use long-press as the primary action trigger — use explicit buttons or swipe actions"
      - "Do not delay visual feedback on tap — the press_feedback pattern requires instant response"
      - "[web] Do not use :focus for focus rings — use :focus-visible to show rings only for keyboard navigation"
    accessibility:
      - "Do not use color as the only differentiator between states — combine with icon, border, or text changes"
      - "Do not skip focus ring styles — keyboard users must see where focus is at all times"
      - "Do not set tab order manually unless the contract explicitly requires it — use document order"
  audit_threshold: 70

design:
  personality: "Minimal and calm — orbital metaphor suggests clarity and organization without visual noise"
  complexity: "restrained"
  quality_tier: "production"
  audience: "Bilingual individuals who prefer a clean, low-distraction task environment"
  avoid:
    - "Do not add decorative illustrations or background patterns"
    - "Do not use more than 2 accent colors on any screen"
    - "Do not animate list items on page load — only animate user-triggered state changes"

formatters:
  priority_label:
    input: enum
    output: string
    mapping:
      low: "$t:priority.low"
      medium: "$t:priority.medium"
      high: "$t:priority.high"
  status_label:
    input: enum
    output: string
    mapping:
      open: "$t:status.open"
      done: "$t:status.done"

mappers:
  task_status_severity:
    open: info
    done: success
  priority_to_severity:
    low: neutral
    medium: info
    high: warning

data_model:
  task:
    id: { type: string, format: uuid }
    title: { type: string, max_length: 160 }
    notes: { type: string, required: false }
    status: { type: enum, values: [open, done] }
    priority: { type: enum, values: [low, medium, high] }
    due_date: { type: date, required: false }
    created_at: { type: datetime }
    updated_at: { type: datetime }

  preferences:
    locale: { type: enum, values: [en, ru] }
    theme: { type: enum, values: [light, dark] }
    reminders_enabled: { type: bool }
    daily_summary_enabled: { type: bool }

  analytics_snapshot:
    completed_today: { type: int }
    open_tasks: { type: int }
    overdue_tasks: { type: int }
    completion_rate: { type: float }

  trend_point:
    label: { type: string }
    completed: { type: int }
    created: { type: int }

  recurring_rule:
    id: { type: string, format: uuid }
    name: { type: string, max_length: 80 }
    cadence: { type: enum, values: [daily, weekly, monthly] }
    interval: { type: int }
    weekday: { type: enum, values: [mon, tue, wed, thu, fri, sat, sun], required: false }
    month_day: { type: int, required: false }
    start_date: { type: date }
    end_date: { type: date, required: false }
    remind_at: { type: string, required: false }
    summary_channel: { type: enum, values: [push, email], required: false }

api:
  base_url: "/api/v1"
  auth: "bearer_token"
  endpoints:
    tasks:
      list: { method: GET, path: "/tasks", params: [filter, search] }
      getById: { method: GET, path: "/tasks/:id" }
      create: { method: POST, path: "/tasks", body: "task" }
      update: { method: PATCH, path: "/tasks/:id", body: "task" }
      toggleStatus: { method: PATCH, path: "/tasks/:id/status" }
      delete: { method: DELETE, path: "/tasks/:id" }
      counts: { method: GET, path: "/tasks/counts" }
    preferences:
      get: { method: GET, path: "/preferences" }
      update: { method: PATCH, path: "/preferences", body: "preferences" }
    analytics:
      overview: { method: GET, path: "/analytics/overview", params: [period] }
      trend: { method: GET, path: "/analytics/trend", params: [period] }
      overdue: { method: GET, path: "/analytics/overdue", params: [limit] }
    recurring:
      create: { method: POST, path: "/recurring-rules", body: "recurring_rule" }
      checkName: { method: GET, path: "/recurring-rules/check-name", params: [value] }
