motion:
  duration:
    instant: 100
    quick: 180
    normal: 280
    slow: 420

  easing:
    default: "ease-out"
    enter: "ease-out"
    exit: "ease-in"
    emphasis: "cubic-bezier(0.2, 0, 0, 1)"

  reduced_motion: "remove-animation"

  patterns:
    press_feedback:
      duration: "instant"
      property: "scale"
      value: 0.98
      generation_notes:
        - "The scale value is subtle by design — do not exaggerate to 0.9 or lower"
        - "[ios] Complement with haptic feedback (.impact(style: .light))"
        - "[android] Use ripple effect instead of or in addition to scale"
    state_change:
      duration: "quick"
      property: "opacity, border-color, background"
    screen_enter:
      duration: "normal"
      easing: "enter"
      pattern: "slide-from-trailing"
    screen_exit:
      duration: "quick"
      easing: "exit"
      pattern: "slide-to-leading"
    checkbox_check:
      duration: "quick"
      easing: "emphasis"
      pattern: "scale-bounce"
    modal_present:
      duration: "normal"
      easing: "enter"
      pattern: "fade-and-lift"
