# social-app — OpenUISpec v0.2
spec_version: "0.2"

project:
  name: "social-app"
  description: ""

includes:
  tokens: "./tokens/"
  contracts: "./contracts/"
  components: "./components/"
  screens: "./screens/"
  flows: "./flows/"
  platform: "./platform/"
  locales: "./locales/"

i18n:
  default_locale: "en"
  supported_locales: [en, ru, uz]
  fallback_strategy: "default"

generation:
  targets: [ios, android, web]
  # output_dir:                          # Optional: map targets to code directories
  #   ios: "../ios-app/"                  # relative to this file
  #   android: "../android-app/"
  #   web: "../web-ui/"
  code_roots:
    backend: "../backend/"                # Required when api.endpoints are declared
  output_format:
    ios: { language: swift, framework: swiftui, min_version: "17.0" }
    android: { language: kotlin, framework: compose, min_sdk: 26 }
    web: { language: typescript, framework: react, bundler: vite }

generation_guidance:
  universal_anti_patterns:
    typography:
      - "Do not fall back to Inter, Roboto, Arial, or system defaults when the spec defines a custom font_family"
      - "Do not use a single font weight throughout — the typography scale defines different weights per level"
      - "Do not use monospace fonts as shorthand for 'technical' aesthetic unless the spec explicitly calls for it"
    color:
      - "Do not use pure black (#000000) or pure white (#FFFFFF) — always resolve through the token layer"
      - "Do not use the AI-default palette: cyan-on-dark, purple-to-blue gradients, neon accents"
      - "Do not use gray text on colored backgrounds — derive text color from the on_color token or a darkened shade"
      - "Do not apply the same opacity to all border tokens — border.default and border.emphasis have distinct opacity values"
    spacing:
      - "Do not use the same spacing value everywhere — the spec defines xxs through xxxl for a reason"
      - "Do not ignore the page_margin and card_padding aliases — they exist to enforce consistent spatial rhythm"
      - "Do not add spacing that the spec doesn't define — if a gap isn't in the token scale, it shouldn't exist in output"
    motion:
      - "Do not use bounce or elastic easing — these feel dated and the spec defines specific easing curves"
      - "Do not apply the same duration to all animations — instant, quick, normal, and slow serve different purposes"
      - "Do not ignore reduced_motion — when the user prefers reduced motion, animations must be removed entirely"
    elevation:
      - "Do not add shadows to elements that don't specify an elevation token"
      - "Do not use the same shadow depth for cards and modals — cards use elevation.md, modals use elevation.lg"
    layout:
      - "Do not assume large-screen layouts work on compact — every multi-pane pattern needs an explicit compact fallback"
      - "Do not use pixel breakpoints — reference size classes by name (compact, regular, expanded)"
    visual:
      - "Do not flatten depth — use elevation tokens to separate layers and give content visual weight"
      - "Do not use generic drop shadows — map every shadow to a specific elevation level from tokens"
      - "Do not apply glassmorphism to interactive controls — reserve frosted effects for non-interactive overlays only"
    interaction:
      - "Do not make swipe gestures the only way to access actions — provide a visible alternative"
      - "Do not delay visual feedback on tap — social content requires instant response"
      - "[web] Do not use :focus for focus rings — use :focus-visible to show rings only for keyboard navigation"
      - "[ios] Do not replace native swipe-back with custom gestures — users expect system navigation"
    accessibility:
      - "Do not use color as the only differentiator between states — combine with icon, border, or text changes"
      - "Do not skip focus ring styles — keyboard users must see where focus is at all times"
      - "Do not set tab order manually unless the contract explicitly requires it — use document order"
  audit_threshold: 70

design:
  personality: "Vibrant, social, content-rich — engagement and discovery are primary, utility is secondary"
  complexity: "elaborate"
  quality_tier: "flagship"
  audience: "Mobile-first social media users who expect rich media, smooth animations, and expressive interactions"
  avoid:
    - "Do not use muted or desaturated brand colors — the palette should feel energetic"
    - "[ios] Do not skip spring animations on content reveal — they are expected in this context"
    - "[android] Do not use non-Material motion patterns — stick to the platform's shared element transitions"

data_model:
  user:
    id: { type: string, required: true }
    handle: { type: string, required: true }
    display_name: { type: string, required: true }
    avatar_url: { type: string }
    bio: { type: string }

  post:
    id: { type: string, required: true }
    author_id: { type: string, required: true }
    body: { type: string, required: true, max_length: 4000 }
    media_url: { type: string }
    media_type: { type: string, values: [image, video] }
    like_count: { type: integer, default: 0 }
    comment_count: { type: integer, default: 0 }
    published_at: { type: string, format: date-time, required: true }

  comment:
    id: { type: string, required: true }
    post_id: { type: string, required: true }
    author_id: { type: string, required: true }
    body: { type: string, required: true, max_length: 1200 }
    created_at: { type: string, format: date-time, required: true }

  story:
    id: { type: string, required: true }
    author_id: { type: string, required: true }
    preview_url: { type: string }
    active: { type: boolean, default: true }

  conversation:
    id: { type: string, required: true }
    title: { type: string }
    unread_count: { type: integer, default: 0 }

  notification:
    id: { type: string, required: true }
    type: { type: string, required: true }
    actor_id: { type: string }
    post_id: { type: string }
    created_at: { type: string, format: date-time, required: true }

  preference:
    theme: { type: string, values: [system, light, dark], default: system }
    push_notifications: { type: boolean, default: true }
    message_previews: { type: boolean, default: true }
    auto_translate: { type: boolean, default: false }

api:
  base_url: "/api/v1"
  auth: "bearer_token"
  endpoints:
    feed:
      list:
        method: GET
        path: "/feed"
        params: [filter, search, cursor]
      stories:
        method: GET
        path: "/feed/stories"
      summary:
        method: GET
        path: "/feed/summary"

    discover:
      creators:
        method: GET
        path: "/discover/creators"
      trends:
        method: GET
        path: "/discover/trends"
      tags:
        method: GET
        path: "/discover/tags"
      search:
        method: GET
        path: "/search"
        params: [query, tab]

    posts:
      getById:
        method: GET
        path: "/posts/:id"
        params: [id]
      comments:
        method: GET
        path: "/posts/:id/comments"
        params: [id]
      create:
        method: POST
        path: "/posts"
        body:
          body: string
          media: string
          audience: string
          tags: array
      toggleLike:
        method: POST
        path: "/posts/:id/likes/toggle"
        params: [id]
      save:
        method: POST
        path: "/posts/:id/save"
        params: [id]

    notifications:
      unreadCount:
        method: GET
        path: "/notifications/unread-count"
      list:
        method: GET
        path: "/notifications"
      markRead:
        method: POST
        path: "/notifications/:id/read"
        params: [id]

    profiles:
      me:
        method: GET
        path: "/profiles/me"
      getById:
        method: GET
        path: "/profiles/:id"
        params: [id]
      posts:
        method: GET
        path: "/profiles/:id/posts"
        params: [id]
      myPosts:
        method: GET
        path: "/profiles/me/posts"
      follow:
        method: POST
        path: "/profiles/:id/follow"
        params: [id]
      updateMe:
        method: PATCH
        path: "/profiles/me"
        body:
          display_name: string
          handle: string
          bio: string
          website: string

    messages:
      list:
        method: GET
        path: "/messages/conversations"
        params: [search]
      getById:
        method: GET
        path: "/messages/conversations/:id"
        params: [id]
      thread:
        method: GET
        path: "/messages/conversations/:id/messages"
        params: [id]
      send:
        method: POST
        path: "/messages/conversations/:id/messages"
        params: [id]
        body:
          body: string
      start:
        method: POST
        path: "/messages/conversations"
        body:
          user_id: string

    preferences:
      get:
        method: GET
        path: "/preferences"
      update:
        method: PATCH
        path: "/preferences"
        body:
          key: string
          value: string
