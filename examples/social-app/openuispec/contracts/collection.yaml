# collection contract extension
# Base definition: spec Section 4.7

collection:
  generation:
    must_avoid:
      - "Do not omit empty states — every collection must render the empty_state component when data is empty"
      - "Do not use infinite scroll without a visible loading indicator at the bottom"
      - "Do not render loading skeletons that mismatch the actual item layout — skeleton shapes must reflect the item_contract variant"
      - "Do not use identical item spacing for list and grid variants — grid uses gap, list uses separator"
      - "Do not render table headers with the same visual weight as table rows — headers use header_background and header_weight tokens"
      - "[web] Do not skip keyboard navigation support — lists need ArrowUp/ArrowDown, grids need 2D arrow navigation"
  variants:
    list:
      semantic: "Vertical list — items use card shape from data_display"
      tokens:
        gap: "spacing.sm"
      generation:
        must_handle:
          - "Vertical stack with consistent gap between items"
          - "Item cards use rounded cap shape from data_display.card variant"

    horizontal_scroll:
      semantic: "Horizontal scrolling row — stories bar, creator cards"
      tokens:
        gap: "spacing.sm"
        padding: "spacing.md"
      generation:
        must_handle:
          - "Horizontal scroll with snap behavior"
          - "Items maintain rounded cap shape"

    chip_row:
      semantic: "Horizontal chip row — filter toggles with rounded cap diagonal"
      tokens:
        gap: "spacing.xs"
      generation:
        must_handle:
          - "Horizontal scrolling chip row"
          - "Chips use rounded cap primary diagonal, not pill shape"
          - "Selected chip uses accent fill, unselected uses border"

    chat_thread:
      semantic: "Chat message list — alternating alignment with rounded cap bubbles"
      tokens:
        gap: "spacing.xs"
      generation:
        must_handle:
          - "Sent messages align right with primary diagonal, received align left with alternate diagonal"
          - "Sent bubbles use brand primary, received use surface secondary"
          - "The diagonal alternation creates visual rhythm between sent and received"
