# nav_container contract extension
# Base definition: spec Section 4.4

nav_container:
  generation:
    must_avoid:
      - "Do not use the same icon treatment for active and inactive items — differentiate with fill/outline variants, color, or both"
      - "Do not center-align sidebar items — use leading alignment with consistent padding per the item_padding_h token"
      - "Do not ignore the collapsed state for sidebar and rail variants — collapsed mode must show only icons with proper spacing"
      - "Do not use a generic hamburger menu icon when the spec defines a specific drawer trigger"
      - "Do not render tab_bar and sidebar with the same visual weight — tab_bar is compact and subordinate, sidebar is prominent"
      - "[ios] Do not forget safe area insets on tab_bar — iOS bottom inset must be respected"
      - "[android] Do not ignore gesture navigation bar insets on tab_bar and bottom navigation"
  variants:
    tab_bar:
      semantic: "Bottom tab bar — standard platform tab bar with badge support"
      tokens:
        background: "color.surface.primary"
        tint_active: "color.brand.primary"
        tint_inactive: "color.text.tertiary"
        item:
          states:
            default:
              text: "color.text.tertiary"
              icon: "color.text.tertiary"
            active:
              text: "color.brand.primary"
              icon: "color.brand.primary"
              badge_background: "color.brand.accent"
              badge_text: "color.brand.accent.on_color"
      platform_mapping:
        ios: { uses_system_tab_bar: true, height: 49 }
        android: { component: "NavigationBar" }
        web: { style: "fixed bottom bar, border-top" }
      generation:
        must_handle:
          - "Use platform-native tab bar component"
          - "Active icon uses brand primary tint"

    sidebar:
      semantic: "Side navigation — expanded layout for tablets and desktop"
      tokens:
        background: "color.surface.secondary"
        width: 280
        item:
          states:
            default:
              text: "color.text.secondary"
              icon: "color.text.secondary"
            active:
              background: "color.brand.primary"
              text: "color.brand.primary.on_color"
              icon: "color.brand.primary.on_color"
              badge_background: "color.brand.accent"
              badge_text: "color.brand.accent.on_color"
      platform_mapping:
        ios: { style: "sidebar" }
        android: { component: "NavigationRail" }
        web: { style: "fixed left sidebar" }
      generation:
        must_handle:
          - "Visible on expanded size class only"
          - "Active item highlighted with rounded cap primary diagonal background"
          - "Collapses to tab_bar on compact size class"
