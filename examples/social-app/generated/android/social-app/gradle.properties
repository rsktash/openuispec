# Gradle settings
# The currently configured max heap space is '512 MiB' and the configured max metaspace is '384 MiB'.
# Increasing to avoid "JVM garbage collector is thrashing" errors.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Use the configuration cache for faster subsequent builds
org.gradle.configuration-cache=true

# Use AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true
